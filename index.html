<style>

.pin-dots{display:flex;gap:14px}

.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}

.pin-key:active{background:var(--y);color:#0d0d0d;transform:scale(.93)}

</style>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const fbApp = initializeApp({
  apiKey:"AIzaSyCGz0t2xfeiMxYIcgVVQTp0bCHY6scIR_w",
  authDomain:"calculadora-plagaway.firebaseapp.com",
  projectId:"calculadora-plagaway",
  storageBucket:"calculadora-plagaway.firebasestorage.app",
  messagingSenderId:"257562908832",
  appId:"1:257562908832:web:14f673952eabba313c51c5"
});
const fsdb = getFirestore(fbApp);

async function fbGet(p){try{const s=await getDoc(doc(fsdb,p));return s.exists()?s.data():null}catch{return null}}
async function fbSet(p,d){try{await setDoc(doc(fsdb,p),d,{merge:true});return true}catch(e){console.error(e);return false}}
function fbListen(p,cb){return onSnapshot(doc(fsdb,p),s=>{if(s.exists())cb(s.data())})}
function fbListenCol(p,cb){return onSnapshot(query(collection(fsdb,p),orderBy('ts','desc')),s=>{cb(s.docs.map(d=>({...d.data(),_id:d.id})))})}
async function fbAdd(p,d){try{return await addDoc(collection(fsdb,p),d)}catch{return null}}
async function fbUpdate(p,d){try{await updateDoc(doc(fsdb,p),d);return true}catch{return false}}
async function fbDel(p){try{await deleteDoc(doc(fsdb,p));return true}catch{return false}}

window.FB={fbGet,fbSet,fbListen,fbListenCol,fbAdd,fbUpdate,fbDel};

async function initFB(){
  const cfg=await fbGet('config/shared');
  if(cfg){
    if(cfg.inventory)window._inv=cfg.inventory;
    if(cfg.sellers)window._sellers=cfg.sellers;
    if(cfg.adminPin)window._apin=cfg.adminPin;
    if(cfg.techPin)window._tpin=cfg.techPin;
    if(cfg.minPrice!=null)window._minPrice=cfg.minPrice;
  } else {
    const def={
      inventory:[
        {id:'cynoff',name:'Cynoff 40',type:'chemical',price:16.25,unit:'L',stock:null},

// ── DOSIFICATION CALC ─────────────────────────────────────────────────────────
function calcDose(l,p,area,lineal){
  const isHogar=l.id==='hogar'||l.id==='hogar_ext';
  const isEvento=l.id==='evento_abierto'||l.id==='evento_cerrado';
  if(isHogar){
    if(l.exteriorOnly){
      return {cynoff:0, demand: area*DOSE.hogar_ext_demand_per_m2};
    } else {
      return {cynoff: area*DOSE.hogar_cynoff_per_m2, demand:0};
    }
  } else if(isEvento){
    return {cynoff: area*DOSE.evento_cynoff_per_m2, demand: area*DOSE.evento_demand_per_m2};
  } else {
    // General: use plaga rate, split between selected chemicals
    const litros = l.id.includes('lineal') ? lineal*(PLAGAS[p]?.lineal||.03) : area*(PLAGAS[p]?.litros||.075);
    return {general: litros};
  }
}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcFor(lugarOverride,paqueteOverride,state){
  const st=state||S;
  const inv=getInv();
  const chems=inv.filter(x=>x.type==='chemical');
  const p=PLAGAS[st.plaga]||PLAGAS.comun;
  const l=lugarOverride||st.lugar;
  const f=FREQS.find(x=>x.id===st.freq)||FREQS[0];
  const pk=PKS.find(x=>x.id===(paqueteOverride||st.paquete))||PKS[1];

  let area=0,lineal=0;
  if(st.useLineal&&st.linealM){lineal=parseFloat(st.linealM);area=lineal*3}
  else{area=parseFloat(st.m2)||0}

  // Chemical cost with real dosification
  const dose=calcDose(l,st.plaga,area,lineal);
  let cq=0;
  const chemBreakdown=[];

  const cynoff=chems.find(x=>x.id==='cynoff')||{price:16.25,name:'Cynoff 40'};
  const demand=chems.find(x=>x.id==='demand')||{price:21.73,name:'Demand Duo'};

  if(dose.cynoff!==undefined||dose.demand!==undefined){
    // Structured dose
    const lCynoff=st.manualLitros?.cynoff!=null?st.manualLitros.cynoff:(dose.cynoff||0);
    const lDemand=st.manualLitros?.demand!=null?st.manualLitros.demand:(dose.demand||0);
    if(lCynoff>0){cq+=lCynoff*cynoff.price;chemBreakdown.push({name:cynoff.name,L:lCynoff,cost:lCynoff*cynoff.price,id:'cynoff'})}
    if(lDemand>0){cq+=lDemand*demand.price;chemBreakdown.push({name:demand.name,L:lDemand,cost:lDemand*demand.price,id:'demand'})}
  } else {
    // General: use selected chemicals or default
    const selChems=st.selChemIds.length>0?chems.filter(c=>st.selChemIds.includes(c.id)):chems.slice(0,1);
    const totalL=dose.general||0;
    const lpc=totalL/Math.max(selChems.length,1);
    selChems.forEach(c=>{
      const l2=st.manualLitros?.[c.id]!=null?st.manualLitros[c.id]:lpc;
      cq+=l2*c.price;
      chemBreakdown.push({name:c.name,L:l2,cost:l2*c.price,id:c.id});
    });
    if(p.b&&selChems.length===1)cq*=1.4;
  }

  // Product extras
  let extrasP=0;
  const productBreakdown=[];
  (st.selProducts||[]).forEach(({id,qty})=>{
    const prod=inv.find(x=>x.id===id);
    if(prod){extrasP+=prod.price*qty;productBreakdown.push({name:prod.name,qty,cost:prod.price*qty})}
  });

  // Service extras
  let extrasS=0;
  if(st.hormiga)extrasS+=50;

  const co=6.25+123+(st.foraneo?200:0);
  const cc=st.cert?450:0;
  const costoTotal=cq+extrasP+extrasS+co+cc+167; // 167=fijos

  // FIXED DISTRIBUTION:
  // Price = CostoTotal + gastos_fijos_distribuidos + mano_obra(10%) + fondo_carro(8%) + reinversion(7%) + margen
  // Algebraically: precio = costoTotal / (1 - 0.10 - 0.08 - 0.07 - margen/100)
  // This ensures distribution percentages are of precio, not stacked incorrectly
  const pkMult=pk.mult;
  const denom=1-(st.margen/100)-0.10-0.08-0.07;
  const denomSafe=Math.max(denom,0.05); // never divide by near-zero
  let pb=(costoTotal/denomSafe)*l.mult*pkMult;

  // Floor: Paquete básico never below 85% of completo cost
  if(pk.id==='basico'){
    const completo=(costoTotal/denomSafe)*l.mult*1.0;
    if(pb<completo*0.65)pb=completo*0.65;
  }

  let mm=1.0,ml=[];
  if(st.infestacion==='alta'){mm*=1.25;ml.push('+25% infestación severa')}
  if(st.horario==='nocturno'){mm*=1.20;ml.push('+20% horario especial')}

  const pm=pb*mm,pD=pm*(1-f.desc),pI=pD*1.16,pIn=pD*.95,pInI=pIn*1.16;

  // Enforce minimum price (after all mults)
  const minP=getMinPrice();
  const pDfinal=Math.max(pD,minP);
  const pIfinal=pDfinal*1.16,pInFinal=pDfinal*.95,pInIFinal=pInFinal*1.16;

  const mano=pDfinal*.10,util=pDfinal*(st.margen/100),fondoCarro=pDfinal*.08,reinversion=pDfinal*.07;
  const belowMin=pD<minP;

  return{cq,extrasP,extrasS,co,cf:167,cc,mano,util,fondoCarro,reinversion,costoTotal,
    pD:pDfinal,pI:pIfinal,pIn:pInFinal,pInI:pInIFinal,
    area:area.toFixed(0),lineal:lineal.toFixed(0),
    g:f.g,desc:f.desc*100,ml,paquete:pk?.label||'',
    chemBreakdown,productBreakdown,belowMin,minP,
    dose};
}

window.addInv=async(type)=>{
  const isC=type==='chemical';
  const n=document.getElementById(isC?'iN':'iN2').value.trim();
  const p=parseFloat(document.getElementById(isC?'iP':'iP2').value);
  if(!n||!p||p<=0){toast('Completa nombre y precio');return}
  const inv=getInv();
  inv.push({id:'i'+Date.now(),name:n,type,price:p,unit:isC?'L':'pza',stock:null});
  await saveInv(inv);rInv(document.getElementById('cnt'));
};
window.delInv=async i=>{const inv=getInv();if(inv.length<=1){toast('Mínimo un producto');return}inv.splice(i,1);await saveInv(inv);rInv(document.getElementById('cnt'))};

// ── TEAM TAB ──────────────────────────────────────────────────────────────────
function rTeam(c){
  if(!isAdmin()){c.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--mu3)"><div style="font-size:36px">🔒</div><div style="margin-top:12px;font-size:13px">Acceso restringido a Admin</div></div>`;return}
  const sellers=getSellers(),hist=getHist();
  c.innerHTML=`<div class="st"><span class="st-n">👤</span><span class="st-h">Equipo de ventas</span></div>
  <div style="margin-bottom:16px">${sellers.map((s,i)=>`<div class="inv-item"><div style="font-size:13px;font-weight:700;color:var(--tx)">${s}</div><button class="inv-del" onclick="delSel(${i})">✕</button></div>`).join('')}</div>
  <div class="add-row" style="grid-template-columns:1fr auto"><input class="inp-text" id="sN" placeholder="Nombre del vendedor"><button class="btn-add" onclick="addSel()">+</button></div>
  <div style="font-size:10px;color:var(--mu3);margin-top:8px;margin-bottom:24px">Cambios sincronizados en todos los dispositivos.</div>
  <span class="lbl">Resumen por vendedor</span>
  ${sellers.map(s=>{const h=hist.filter(x=>x.seller===s),tot=h.reduce((a,x)=>a+(x.precio||0),0),conv=h.filter(x=>x.converted).length;return`<div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px">
    <div><div style="font-size:13px;font-weight:700;color:var(--tx)">${s}</div>
    <div style="font-size:10px;color:var(--mu2)">${h.length} cot. · ${conv} vendidas (${h.length?Math.round(conv/h.length*100):0}%)</div></div>
    <div style="font-size:15px;font-weight:700;color:var(--y)">${h.length?fmt(tot):'—'}</div>
  </div>`}).join('')}
  <div style="margin-top:20px"><button class="cta sec" onclick="showCfg()">⚙️ Gestionar PINs</button></div>`;
}
window.addSel=async()=>{const n=document.getElementById('sN').value.trim();if(!n){toast('Escribe un nombre');return}const s=getSellers();if(s.includes(n)){toast('Ya existe');return}s.push(n);await saveSellers(s);rTeam(document.getElementById('cnt'))};
window.delSel=async i=>{const s=getSellers();if(s.length<=1){toast('Mínimo un vendedor');return}s.splice(i,1);await saveSellers(s);rTeam(document.getElementById('cnt'))};

// ── INIT ──────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
renderPin('unlock');
</script>
</body>

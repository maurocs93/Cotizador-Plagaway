<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGz0t2xfeiMxYIcgVVQTp0bCHY6scIR_w",
  authDomain: "calculadora-plagaway.firebaseapp.com",
  projectId: "calculadora-plagaway",
  storageBucket: "calculadora-plagaway.firebasestorage.app",
  messagingSenderId: "257562908832",
  appId: "1:257562908832:web:14f673952eabba313c51c5"
};

const fbApp = initializeApp(firebaseConfig);
const fsdb = getFirestore(fbApp);

// ── FIREBASE HELPERS ─────────────────────────────────────────────────────────
async function fbGet(docPath) {
  try { const s = await getDoc(doc(fsdb, docPath)); return s.exists() ? s.data() : null; } catch { return null; }
}
async function fbSet(docPath, data) {
  try { await setDoc(doc(fsdb, docPath), data, {merge:true}); return true; } catch(e) { console.error(e); return false; }
}
function fbListen(docPath, cb) {
  return onSnapshot(doc(fsdb, docPath), snap => { if(snap.exists()) cb(snap.data()); });
}
function fbListenCol(colPath, cb) {
  return onSnapshot(query(collection(fsdb, colPath), orderBy('date','desc')), snap => {
    cb(snap.docs.map(d=>({...d.data(), _id:d.id})));
  });
}
async function fbAddHist(entry) {
  try { await addDoc(collection(fsdb, 'history'), entry); return true; } catch { return false; }
}
async function fbDelHist(id) {
  try { await deleteDoc(doc(fsdb, 'history', id)); return true; } catch { return false; }
}

// Expose to window for non-module code
window.FB = { fbGet, fbSet, fbListen, fbListenCol, fbAddHist, fbDelHist };

// ── INIT FIREBASE DATA ────────────────────────────────────────────────────────
// Load shared config on start
async function loadSharedConfig() {
  const cfg = await fbGet('config/shared');
  if (cfg) {
    if (cfg.chems) window._fbChems = cfg.chems;
    if (cfg.sellers) window._fbSellers = cfg.sellers;
    if (cfg.adminPin) window._fbAdminPin = cfg.adminPin;
    if (cfg.techPin) window._fbTechPin = cfg.techPin;
  } else {
    // First time: push defaults
    await fbSet('config/shared', {
      chems: [{id:'cynoff',name:'Cynoff 40',price:16.25},{id:'demand',name:'Demand Duo',price:21.73}],
      sellers: ['Heriberto','Mauro'],
      adminPin: '1234',
      techPin: '0000'
    });
    window._fbAdminPin = '1234';
    window._fbTechPin = '0000';
  }

  // Listen for real-time config changes
  fbListen('config/shared', data => {
    if (data.chems) window._fbChems = data.chems;
    if (data.sellers) window._fbSellers = data.sellers;
    if (data.adminPin) window._fbAdminPin = data.adminPin;
    if (data.techPin) window._fbTechPin = data.techPin;
    updCS();
  });

  // Listen for history
  fbListenCol('history', entries => {
    window._fbHist = entries;
    if (window._histCallback) window._histCallback(entries);
  });

  window._fbReady = true;
  updCS();
}

loadSharedConfig();
</script>

<script>
// ── LOCAL STORAGE FALLBACK ────────────────────────────────────────────────────
const db={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};

function getChems(){return window._fbChems || db.get('pw_chems') || [{id:'cynoff',name:'Cynoff 40',price:16.25},{id:'demand',name:'Demand Duo',price:21.73}]}
async function saveChems(c){window._fbChems=c;if(window.FB)await window.FB.fbSet('config/shared',{chems:c});else db.set('pw_chems',c)}

// ── PIN SCREEN ────────────────────────────────────────────────────────────────
function renderPin(mode, onOk) {
  const ps=document.getElementById('ps');
  ps.style.cssText='display:flex;flex-direction:column;min-height:100vh';
  let buf='',step=0,fp='',selectedRole='tech',changingRole=null;

  function draw(err=''){
    const isUnlock=mode==='unlock';
    const isChange=mode==='changeAdmin'||mode==='changeTech';
    ps.innerHTML=`<div class="pin-wrap">
      <div class="pin-logo">PLAGA<b>W</b>AY</div>
      ${isUnlock?`
        <div class="pin-sub">Selecciona tu rol</div>
        <div class="pin-role">
          <div class="pin-role-btn ${selectedRole==='tech'?'sel':''}" onclick="selRole('tech')">👷 Técnico</div>
          <div class="pin-role-btn ${selectedRole==='admin'?'sel':''}" onclick="selRole('admin')">🔑 Admin</div>
        </div>`
      :`<div class="pin-sub">${step===0?(mode==='changeAdmin'?'Nuevo PIN Admin':'Nuevo PIN Técnico'):'Confirmar PIN'}</div>`}
      <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot ${buf.length>i?'filled':''}"></div>`).join('')}</div>
      <div class="pin-err">${err}</div>
      <div class="pin-pad">${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<button class="pin-key" onclick="pk('${k}')" ${k===''?'style="visibility:hidden"':''}>${k}</button>`).join('')}</div>
      ${isChange?`<button class="pin-change" onclick="cancelPC()">Cancelar</button>`:''}
    </div>`;

    window.selRole=r=>{selectedRole=r;draw()};
    window.pk=k=>{
      if(k==='⌫'){buf=buf.slice(0,-1);draw();return}
      if(buf.length>=4)return;buf+=k;draw();
      if(buf.length===4)setTimeout(()=>chk(buf),120)
    };
  }

  function chk(entered){
    if(mode==='unlock'){
      if(entered===getAdminPin()){currentRole='admin';unlock(onOk)}
      else if(entered===getTechPin()){currentRole='tech';unlock(onOk)}
      else{buf='';draw('PIN incorrecto')}
    } else {
      if(step===0){fp=entered;buf='';step=1;draw()}
      else{
        if(entered===fp){
          if(mode==='changeAdmin')setAdminPin(entered).then(()=>{cancelPC();toast('PIN Admin actualizado ✓')});
          else setTechPin(entered).then(()=>{cancelPC();toast('PIN Técnico actualizado ✓')});
        } else {buf='';step=0;fp='';draw('No coinciden, intenta de nuevo')}
      }
    }
  }

  function unlock(cb){
    ps.style.display='none';
    const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';
    updCS();if(cb)cb();else render();
  }

  draw();
}

function showPinChange(){
  if(!isAdmin()){toast('Solo Admin puede cambiar PINs');return}
  showCfg();
}

window.cancelPC=()=>{
  document.getElementById('ps').style.display='none';
  const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';
};

let S=iS(),tab=0,openCats={};
function iS(){return{step:1,lugar:null,m2:'',linealM:'',useLineal:false,plaga:null,paquete:null,selectedChems:[],freq:'unica',foraneo:false,cert:false,hormiga:false,trampaMosca:false,trampaMoscaQty:1,cebaderoRoedor:false,cebaderoQty:1,infestacion:'normal',horario:'normal',margen:38,result:null,clientName:'',clientAddr:'',notes:'',seller:'',sharePrice:'standard'}}
const fmt=n=>'$'+Math.round(n).toLocaleString('es-MX');

// ── CALC ──────────────────────────────────────────────────────────────────────
function calcFor(lugarOverride,paqueteOverride,state){
  const st=state||S;
  const chems=getChems();
  const p=PLAGAS[st.plaga];
  const l=lugarOverride||st.lugar;
  const f=FREQS.find(x=>x.id===st.freq);
  const pk=PKS.find(x=>x.id===(paqueteOverride||st.paquete));
  const sc=st.selectedChems.map(id=>chems.find(c=>c.id===id)).filter(Boolean);

  let area=0,lineal=0;
  if(st.useLineal&&st.linealM){lineal=parseFloat(st.linealM);area=lineal*3}
  else{area=parseFloat(st.m2)||0}

  let cq=0;
  const isHogar=l.id==='hogar'||l.id==='hogar_ext';
  const isEvento=l.id==='evento_abierto'||l.id==='evento_cerrado';
  if(isHogar){
    cq=l.exteriorOnly?(3.5*21.73):(7*16.25);
  } else if(isEvento&&area>0){
    cq=area*CHEM_PROFILES.evento_per_m2.cynoff*16.25+area*CHEM_PROFILES.evento_per_m2.demand*21.73;
  } else if(sc.length>0){
    const lt=st.useLineal?lineal*p.lineal:area*p.litros,lpc=lt/sc.length;
    sc.forEach(c=>{cq+=lpc*c.price});
    if(p.b&&sc.length===1)cq*=1.4;
  } else {
    const lt=st.useLineal?lineal*p.lineal:area*p.litros;
    cq=lt*16.25;if(p.b)cq+=lt*.4*21.73;
  }

  let extras=0;
  if(st.hormiga)extras+=50;
  if(st.trampaMosca)extras+=st.trampaMoscaQty*200;
  if(st.cebaderoRoedor)extras+=st.cebaderoQty*200;

  const co=CONS+GAS+(st.foraneo?200:0),cc=st.cert?450:0;
  const costoBase=cq+extras+co+FIJOS;
  const pkMult=pk?pk.mult:1.0,denom=1-(st.margen/100)-.10;
  let pb=(costoBase/denom)*l.mult*pkMult+cc;

  let mm=1.0,ml=[];
  if(st.infestacion==='alta'){mm*=1.25;ml.push('+25% infestación severa')}
  if(st.horario==='nocturno'){mm*=1.20;ml.push('+20% horario especial')}

  const pm=pb*mm,pD=pm*(1-f.desc),pI=pD*1.16,pIn=pD*.95,pInI=pIn*1.16;
  const mano=pD*.10,util=pD*(st.margen/100);
  const fondoCarro=pD*.08,reinversion=pD*.07;
  const litrosInfo=isHogar?(l.exteriorOnly?'3.5L Demand Duo':'7L Cynoff 40'):`~${(area*(CHEM_PROFILES.evento_per_m2.cynoff+CHEM_PROFILES.evento_per_m2.demand)).toFixed(1)}L`;

  return{cq,extras,co,cf:FIJOS,cc,mano,util,pD,pI,pIn,pInI,fondoCarro,reinversion,
    area:area.toFixed(0),lineal:lineal.toFixed(0),g:f.g,desc:f.desc*100,ml,paquete:pk?.label||'',sc,litrosInfo};
}
function calc(){return calcFor(null,null,S)}

  </select></div>
  <span class="lbl">Tipo de lugar</span>

window.togCat=id=>{openCats[id]=!openCats[id];const h=document.querySelector(`.cat-hdr[onclick="togCat('${id}')"]`),b=h?.nextElementSibling,ch=h?.querySelector('.cat-ch');if(h)h.classList.toggle('open',openCats[id]);if(b)b.classList.toggle('open',openCats[id]);if(ch)ch.classList.toggle('open',openCats[id])};
function selL(id){S.lugar=findL(id);if(S.lugar.m2)S.m2=String(S.lugar.m2);S.useLineal=!!S.lugar.lineal;S.step=2;render()}

// ── S2: Plaga + Área ──────────────────────────────────────────────────────────
function s2(c){
  const l=S.lugar,canL=!!l.lineal;
  c.innerHTML=`<div class="st"><span class="st-n">02</span><span class="st-h">Plaga y área</span></div>
  <div class="blk">
    ${canL?`<span class="lbl">Método de medición</span><div class="g2" style="margin-bottom:12px">
      <button class="card ${!S.useLineal?'on':''}" onclick="S.useLineal=false;render()"><div class="ct">m² (área)</div><div class="cs">Espacio total</div></button>
      <button class="card ${S.useLineal?'on':''}" onclick="S.useLineal=true;render()"><div class="ct">ml (perímetro)</div><div class="cs">Solo alrededores</div></button>
    </div>`:''}
    <span class="lbl">${S.useLineal?'Metros lineales de perímetro':'Metros cuadrados del área'}</span>
    <div class="irow">
      <input class="im2" type="number" id="m2i" value="${S.useLineal?S.linealM:S.m2}" oninput="${S.useLineal?'S.linealM=this.value':'S.m2=this.value'}" inputmode="numeric">
      <span class="iu">${S.useLineal?'ml':'m²'}</span>
      ${l.m2&&!S.useLineal?`<button class="bsug" onclick="document.getElementById('m2i').value=S.m2='${l.m2}'">Sugerido (${l.m2})</button>`:''}
    </div>
  </div>
  <div class="blk"><span class="lbl">Tipo de plaga</span><div class="g1">
    ${Object.entries(PLAGAS).map(([id,p])=>`<button class="card ${S.plaga===id?'on':''}" onclick="selP('${id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="ct"><span class="dot" style="background:${p.color}"></span>${p.label}</div><div class="cs" style="margin-top:3px">${p.sub}</div></div>
        ${p.tag?`<span class="ctag">Diferenciado</span>`:''}
      </div></button>`).join('')}
  </div></div>`;
}
function selP(id){const v=S.useLineal?S.linealM:S.m2;if(!v||parseFloat(v)<=0){const e=document.getElementById('m2i');e.focus();e.style.borderColor='#ff4444';setTimeout(()=>e.style.borderColor='',1500);return}S.plaga=id;S.step=3;render()}

// ── S3: Paquete — includes Exterior option and triple-compare if hogar ────────
function s3(c){
  const isH=S.lugar?.id==='hogar';
  const isExt=S.lugar?.id==='hogar_ext';
  const isHogarFamily=isH||isExt;

  c.innerHTML=`<div class="st"><span class="st-n">03</span><span class="st-h">Elige el paquete</span></div>

  ${isH?`<div style="margin-bottom:14px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border)">
    <div style="font-size:10px;font-weight:800;color:var(--mu2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Tipo de servicio</div>
    <div class="g2">
      <button class="card ${!isExt?'on':''}" onclick="S.lugar=findL('hogar');S.m2='200';render()">
        <div class="ct">Interior + Exterior</div><div class="cs">Servicio completo</div>
      </button>
      <button class="card ${isExt?'on':''}" onclick="S.lugar=findL('hogar_ext');S.m2='200';render()">
        <div class="ct" style="color:var(--y2)">Solo Exterior</div>
        <div class="cs">Perímetro y jardín</div>
        <div style="font-size:9px;color:var(--green);margin-top:4px;font-weight:700">Precio más accesible</div>
      </button>
    </div>
  </div>`:''}

  <div class="g1">
    ${PKS.map(pk=>{
      const inc=isExt?pk.extInc:(isH?pk.hInc:pk.gInc);
      return`<button class="card ${S.paquete===pk.id?'on':''}" onclick="selPk('${pk.id}')">
        ${pk.badge?`<div style="margin-bottom:6px"><span class="badge-best" style="background:${pk.bc};color:#0d0d0d">${pk.badge}</span></div>`:'<div style="height:18px"></div>'}
        <div class="ct" style="font-size:16px;color:${S.paquete===pk.id?pk.color:'inherit'}">${pk.label}</div>
        <div class="cs" style="margin-top:3px;margin-bottom:10px">${pk.tagline}</div>
        <div style="display:grid;gap:4px">${inc.map(i=>`<div style="font-size:10px;color:var(--mu2);line-height:1.4">✓ ${i}</div>`).join('')}</div>
        <div style="margin-top:8px;font-size:9px;color:var(--mu3);font-style:italic">${pk.desc}</div>
      </button>`}).join('')}
  </div>

  ${isHogarFamily?`<div style="margin-top:16px;padding:13px 14px;background:var(--bg3);border:1px solid var(--border)">
    <div style="font-size:11px;color:var(--mu2);margin-bottom:8px">¿Quieres ver los 3 paquetes con precios antes de decidir?</div>
    <button class="cta ob" style="margin-top:0" onclick="showTriplePreview()">📊 Ver comparativa de precios</button>
  </div>`:''}`;
}
function selPk(id){S.paquete=id;S.step=4;render()}

// Triple preview: shows all 3 prices before committing
function showTriplePreview(){
  if(!S.m2||parseFloat(S.m2)<=0){toast('Ingresa los m² primero');return}
  const rB=calcFor(null,'basico',S),rC=calcFor(null,'completo',S),rP=calcFor(null,'premium',S);
  const isExt=S.lugar?.id==='hogar_ext';
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<div class="st"><span class="st-n">03</span><span class="st-h">Comparativa de precios</span></div>
  <div style="margin-bottom:14px;font-size:11px;color:var(--mu2)">Precios sin IVA internos. Selecciona el que quieres cotizar.</div>
  ${[{pk:PKS[0],r:rB},{pk:PKS[1],r:rC},{pk:PKS[2],r:rP}].map(({pk,r})=>`
    <div style="background:var(--bg2);border:1px solid ${S.paquete===pk.id?pk.color:' var(--border)'};padding:16px;margin-bottom:10px;cursor:pointer" onclick="selPk('${pk.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          ${pk.badge?`<div style="margin-bottom:4px"><span class="badge-best" style="background:${pk.bc};color:#0d0d0d">${pk.badge}</span></div>`:''}
          <div style="font-size:15px;font-weight:700;color:${pk.color}">${pk.label}</div>
          <div style="font-size:10px;color:var(--mu2);margin-top:2px">${isExt?'Solo Exterior':''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:700;color:var(--y)">${fmt(r.pD)}</div>
          <div style="font-size:10px;color:var(--mu3)">sin IVA</div>
          <div style="font-size:12px;color:var(--mu2);margin-top:2px">${fmt(r.pI)} c/IVA</div>
        </div>
      </div>
      <button class="cta" style="margin-top:6px;padding:10px;font-size:11px" onclick="event.stopPropagation();selPk('${pk.id}')">Seleccionar este →</button>
    </div>`).join('')}
  <button class="cta sec" onclick="S.step=3;render()">← Volver a paquetes</button>`;
}

function s4(c){

  c.innerHTML=`<div class="st"><span class="st-n">04</span><span class="st-h">Detalles del servicio</span></div>

    ${chems.map(ch=>`<div class="cs-item ${S.selectedChems.includes(ch.id)?'on':''}" onclick="togC('${ch.id}')">
      <div><div style="font-size:13px;font-weight:600;color:var(--tx)">${ch.name}</div><div style="font-size:10px;color:var(--mu2)">$${ch.price}/L</div></div>
      <div class="cs-chk">${S.selectedChems.includes(ch.id)?'✓':''}</div>

      <div class="ct">${f.label}</div>${f.desc?`<div class="cs" style="color:var(--green)">−${f.desc*100}% dcto.</div>`:''}

function togC(id){const i=S.selectedChems.indexOf(id);if(i>=0)S.selectedChems.splice(i,1);else S.selectedChems.push(id);render()}

// ── S5: Resultado ─────────────────────────────────────────────────────────────
function s5(c){
  const r=S.result,pk=PKS.find(x=>x.id===S.paquete);
  const cat=LUGAR_CATS.find(c=>c.lugares.some(l=>l.id===S.lugar?.id));
  // Price shown to client = with IVA (no mention of "sin IVA")
  const dPiva=S.sharePrice==='intro'?r.pInI:r.pI;

  c.innerHTML=`<div class="st"><span class="st-n">05</span><span class="st-h">Cotización</span></div>

      </div>

        <div class="popt-sub">IVA incluido · para cerrar</div>

  </div>

  <!-- INTERNAL breakdown -->
  <div class="rbox">

      <div><div class="rpl">Precio al cliente</div><div class="rpv y">${fmt(dPiva)}</div><div class="rps">IVA incluido</div></div>
      <div><div class="rpl">Sin IVA (interno)</div><div class="rpv w">${fmt(S.sharePrice==='intro'?r.pIn:r.pD)}</div><div class="rps">referencia interna</div></div>
    </div>
    <hr class="rdiv">
    <div class="rgrid">
      <div><div class="rpl">Tu utilidad</div><div class="rpv g">${fmt(r.util)}</div><div class="rps">${S.margen}% empresa</div></div>
      <div><div class="rpl">Mano de obra</div><div class="rpv w">${fmt(r.mano)}</div><div class="rps">10% socios</div></div>

        <div class="crow"><span class="crl">Químicos (${r.litrosInfo})</span><span class="crv" style="color:var(--mu)">${fmt(r.cq)}</span></div>
        ${S.hormiga?`<div class="crow"><span class="crl">Hormigueros</span><span class="crv" style="color:var(--mu)">$50</span></div>`:''}
        ${S.trampaMosca?`<div class="crow"><span class="crl">Trampas moscas ×${S.trampaMoscaQty}</span><span class="crv" style="color:var(--mu)">${fmt(S.trampaMoscaQty*200)}</span></div>`:''}
        ${S.cebaderoRoedor?`<div class="crow"><span class="crl">Cebaderos roedores ×${S.cebaderoQty}</span><span class="crv" style="color:var(--mu)">${fmt(S.cebaderoQty*200)}</span></div>`:''}
        <div class="crow"><span class="crl">Gasolina + consumibles</span><span class="crv" style="color:var(--mu)">${fmt(r.co)}</span></div>
        ${S.cert?`<div class="crow"><span class="crl">Certificado COESPRISSON</span><span class="crv" style="color:var(--mu)">$450</span></div>`:''}
      </div>
      <div class="cbox-sec"><div class="cbox-sec-t">▸ Distribución priorizada</div>

  <div class="ibar"><strong>Garantía:</strong> ${r.g}${r.desc>0?`&nbsp;·&nbsp;<span style="color:var(--green)">Póliza −${r.desc}%</span>`:''}</div>

// ── SHARE — IVA included, no mention of "sin IVA" ────────────────────────────
function getInc(pkId){
  const pk=PKS.find(x=>x.id===pkId);
  const isExt=S.lugar?.id==='hogar_ext';
  const isH=S.lugar?.id==='hogar'||isExt;
  return isExt?pk.extInc:(isH?pk.hInc:pk.gInc);
}

function shareQ(mode){
  const txt=mode==='triple'?buildTripleMsg():buildMsg();
  if(navigator.share)navigator.share({text:txt}).catch(()=>copyClip(txt));else copyClip(txt);
}
function copyClip(t){navigator.clipboard.writeText(t).then(()=>toast('Cotización copiada ✓')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Cotización copiada ✓')})}
function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--y);color:#0d0d0d;padding:10px 20px;font-weight:900;font-size:12px;letter-spacing:.1em;z-index:999;white-space:nowrap';document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}

// ── SAVE / RESET ──────────────────────────────────────────────────────────────
async function saveAndReset(){
  const r=S.result,pk=PKS.find(x=>x.id===S.paquete),cat=LUGAR_CATS.find(c=>c.lugares.some(l=>l.id===S.lugar?.id));
  await addHistEntry({clientName:S.clientName||'Sin nombre',clientAddr:S.clientAddr,cat:cat?.label||'',plaga:PLAGAS[S.plaga]?.label||'',paquete:pk?.label||'',precio:S.sharePrice==='intro'?r.pInI:r.pI,priceType:S.sharePrice,seller:S.seller,notes:S.notes,exteriorOnly:S.lugar?.exteriorOnly||false});
  toast('Guardado ✓');resetQ();
}
function resetQ(){S=iS();render()}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function rHist(c){
  window._histCallback=entries=>{if(tab===1)rHist(document.getElementById('cnt'))};
  const allH=getHist(),sellers=['Todos',...getSellers()],ss=db.get('pw_hs')||'Todos',sq=db.get('pw_hq')||'';
  let h=allH;if(ss!=='Todos')h=h.filter(x=>x.seller===ss);if(sq)h=h.filter(x=>(x.clientName+x.clientAddr+x.plaga+x.paquete+x.seller).toLowerCase().includes(sq.toLowerCase()));
  c.innerHTML=`<div class="st"><span class="st-n">📋</span><span class="st-h">Historial</span></div>
  <div class="s-row">
    <input class="s-inp" placeholder="Buscar cliente, plaga..." value="${sq}" oninput="db.set('pw_hq',this.value);rHist(document.getElementById('cnt'))">
    <select class="s-sel" onchange="db.set('pw_hs',this.value);rHist(document.getElementById('cnt'))">
      ${sellers.map(s=>`<option value="${s}" ${ss===s?'selected':''}>${s}</option>`).join('')}
    </select>
  </div>
  ${h.length===0?`<div style="text-align:center;padding:50px 20px;color:var(--mu3)"><div style="font-size:36px;margin-bottom:12px">📋</div><div style="font-size:13px">Sin cotizaciones${sq||ss!=='Todos'?' que coincidan.':' guardadas.'}</div></div>`
  :h.map(item=>`<div class="hist-item">
    <div class="hist-top">
      <div><div class="hist-name">${item.clientName}</div>
      <div class="hist-meta">${item.date} · ${item.cat||''} · ${item.plaga||''}</div>
      ${item.paquete?`<div style="font-size:10px;color:var(--y);margin-top:2px">${item.paquete}${item.exteriorOnly?' · <span style="color:var(--y2)">Exterior</span>':''}</div>`:''}
      ${item.seller?`<div style="font-size:10px;color:var(--mu3);margin-top:2px">Vendedor: ${item.seller}</div>`:''}
      </div>
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div><div class="hist-price">${fmt(item.precio)}</div><div style="font-size:9px;color:var(--mu3);text-align:right">IVA incl.</div></div>
        ${isAdmin()?`<button class="hist-del" onclick="doDelH('${item._id||item.id}')">✕</button>`:''}
      </div>
    </div>
    ${item.clientAddr?`<div style="font-size:10px;color:var(--mu3);margin-top:4px">${item.clientAddr}</div>`:''}
    ${item.notes?`<div style="font-size:10px;color:var(--mu3);margin-top:2px;font-style:italic">${item.notes}</div>`:''}
  </div>`).join('')}
  ${allH.length>0&&isAdmin()?`<button class="cta sec" style="margin-top:8px" onclick="if(confirm('¿Borrar todo el historial?')){saveHist([]);db.set('pw_hq','');db.set('pw_hs','Todos');rHist(document.getElementById('cnt'))}">Borrar historial completo</button>`:''}`;
}
window.doDelH=async id=>{await delHistEntry(id);rHist(document.getElementById('cnt'))};

// ── CHEMICALS (Admin only) ────────────────────────────────────────────────────
function rChems(c){
  if(!isAdmin()){c.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--mu3)"><div style="font-size:36px">🔒</div><div style="margin-top:12px;font-size:13px">Acceso restringido a Admin</div></div>`;return}
  const chems=getChems();
  c.innerHTML=`<div class="st"><span class="st-n">⚗️</span><span class="st-h">Químicos</span></div>
  <div style="margin-bottom:16px">${chems.map((ch,i)=>`<div class="chem-item"><div><div style="font-size:13px;font-weight:600;color:var(--tx)">${ch.name}</div><div style="font-size:11px;color:var(--mu)">$${ch.price}/litro</div></div><button class="chem-del" onclick="delCh(${i})">✕</button></div>`).join('')}</div>
  <span class="lbl">Agregar químico</span>
  <div class="add-row"><input class="inp-text" id="chN" placeholder="Nombre del producto"><input class="inp-num" id="chP" placeholder="$/L" type="number" step="0.01" inputmode="decimal"><button class="btn-add" onclick="addCh()">+</button></div>
  <div style="font-size:10px;color:var(--mu3);margin-top:8px">Cambios sincronizados en todos los dispositivos.</div>`;
}
window.addCh=async()=>{const n=document.getElementById('chN').value.trim(),p=parseFloat(document.getElementById('chP').value);if(!n||!p||p<=0){toast('Completa nombre y precio');return}const c=getChems();c.push({id:'c'+Date.now(),name:n,price:p});await saveChems(c);rChems(document.getElementById('cnt'))};
window.delCh=async i=>{const c=getChems();if(c.length<=1){toast('Debe haber al menos un químico');return}c.splice(i,1);await saveChems(c);rChems(document.getElementById('cnt'))};

// ── SELLERS (Admin only) ──────────────────────────────────────────────────────
function rSellers(c){
  if(!isAdmin()){c.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--mu3)"><div style="font-size:36px">🔒</div><div style="margin-top:12px;font-size:13px">Acceso restringido a Admin</div></div>`;return}
  const sellers=getSellers(),hist=getHist();
  c.innerHTML=`<div class="st"><span class="st-n">👤</span><span class="st-h">Equipo de ventas</span></div>
  <div style="margin-bottom:16px">${sellers.map((s,i)=>`<div class="chem-item"><div style="font-size:13px;font-weight:700;color:var(--tx)">${s}</div><button class="chem-del" onclick="delSel(${i})">✕</button></div>`).join('')}</div>
  <span class="lbl">Agregar vendedor</span>
  <div class="add-row"><input class="inp-text" id="sN" placeholder="Nombre del vendedor"><div></div><button class="btn-add" onclick="addSel()">+</button></div>
  <div style="font-size:10px;color:var(--mu3);margin-top:8px;margin-bottom:24px">Cambios sincronizados en todos los dispositivos.</div>
  <span class="lbl">Resumen por vendedor</span>
  ${sellers.map(s=>{const h=hist.filter(x=>x.seller===s),tot=h.reduce((a,x)=>a+x.precio,0);return`<div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px"><div><div style="font-size:13px;font-weight:700;color:var(--tx)">${s}</div><div style="font-size:10px;color:var(--mu2)">${h.length} cotización${h.length!==1?'es':''}</div></div><div style="font-size:15px;font-weight:700;color:var(--y)">${h.length?fmt(tot):'—'}</div></div>`}).join('')}
  <div style="margin-top:20px"><button class="cta sec" onclick="showCfg()">⚙️ Gestionar PINs de acceso</button></div>`;
}
window.addSel=async()=>{const n=document.getElementById('sN').value.trim();if(!n){toast('Escribe un nombre');return}const s=getSellers();if(s.includes(n)){toast('Ya existe');return}s.push(n);await saveSellers(s);rSellers(document.getElementById('cnt'))};
window.delSel=async i=>{const s=getSellers();if(s.length<=1){toast('Debe haber al menos un vendedor');return}s.splice(i,1);await saveSellers(s);rSellers(document.getElementById('cnt'))};

// ── INIT ──────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
renderPin('unlock');
</script>

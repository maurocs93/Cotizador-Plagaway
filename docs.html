<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Plagaway · Documentos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#272727;--border2:#1e1e1e;--y:#f5c800;--y2:#c9a200;--y3:#7a6100;--y4:#1a1600;--tx:#f5f0e8;--tx2:#c8c0b0;--mu:#888880;--mu2:#555550;--mu3:#333330;--red:#ff4444;--blue:#4ac8f0;--green:#72c040;--orange:#ff8844}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Helvetica Neue',Arial,sans-serif;overscroll-behavior:none;font-size:15px}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 18px 10px;border-bottom:2px solid var(--y3);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:20}
.logo-wm{font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-1px;line-height:1}.logo-wm b{color:var(--y)}
.logo-pill{background:var(--y);color:#0d0d0d;font-size:7px;font-weight:900;letter-spacing:.15em;padding:3px 6px;text-transform:uppercase;align-self:flex-start;margin-top:2px}
.hdr-row{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;color:var(--mu2);margin-top:4px}
.hdr-right{display:flex;gap:7px;align-items:center;margin-top:2px}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--mu);padding:7px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;font-family:inherit}
.cnt{padding:18px 18px 40px;flex:1}
.fade{animation:fu .22s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.st{margin-bottom:16px;display:flex;align-items:baseline;gap:10px}
.st-n{font-size:10px;font-weight:900;color:#0d0d0d;background:var(--y);padding:3px 7px;letter-spacing:.1em;flex-shrink:0}
.st-h{font-size:18px;font-weight:700;color:var(--tx)}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}.g1{display:grid;gap:7px}
.card{background:var(--bg2);border:1px solid var(--border);color:var(--tx2);padding:14px 16px;cursor:pointer;font-family:inherit;transition:all .12s;text-align:left;width:100%;-webkit-appearance:none}
.card:active{transform:scale(.97)}.card.on{background:var(--y4);border-color:var(--y);color:var(--tx)}
.ct{font-size:14px;font-weight:600;margin-bottom:3px}.cs{font-size:10px;color:var(--mu2)}
.inp{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:100%}
.inp:focus{border-color:var(--y)}
.inp-sm{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:8px 10px;font-family:inherit;font-size:12px;outline:none;width:100%}
.inp-sm:focus{border-color:var(--y)}
.blk{margin-bottom:18px}
.cta{width:100%;background:var(--y);color:#0d0d0d;border:none;padding:15px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-family:inherit;font-weight:900;cursor:pointer;margin-top:10px;transition:opacity .15s}
.cta:active{opacity:.85}
.cta.sec{background:transparent;border:1px solid var(--border);color:var(--mu);font-weight:700}
.cta.oy{background:transparent;border:2px solid var(--y);color:var(--y);font-weight:900}
.cta.og{background:transparent;border:2px solid var(--green);color:var(--green);font-weight:900}
.trow{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .2s;margin-bottom:6px}
.trow.on{border-color:var(--y);background:var(--y4)}
.tlbl{font-size:13px;font-weight:500;color:var(--mu);transition:color .2s}.trow.on .tlbl{color:var(--tx)}
.tsub{font-size:10px;color:var(--mu2);margin-top:2px}
.tsw{width:34px;height:19px;background:var(--border);border-radius:10px;position:relative;flex-shrink:0;transition:background .2s}
.trow.on .tsw{background:var(--y)}
.tkn{width:13px;height:13px;background:var(--mu3);border-radius:50%;position:absolute;top:3px;left:3px;transition:all .2s}
.trow.on .tkn{left:18px;background:#0d0d0d}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{flex:1;padding:10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--mu2);font-family:inherit;border-bottom:2px solid transparent;transition:all .2s}
.tab.act{color:var(--y);border-bottom-color:var(--y)}
.plaga-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.plaga-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.plaga-item.on{border-color:var(--y);background:var(--y4)}
.plaga-chk{width:16px;height:16px;border:2px solid var(--border);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#0d0d0d}
.plaga-item.on .plaga-chk{background:var(--y);border-color:var(--y)}
.plaga-name{font-size:11px;color:var(--mu)}.plaga-item.on .plaga-name{color:var(--tx)}
.ibar{padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--y);font-size:11px;color:var(--mu);margin-bottom:12px;line-height:1.5}
.ibar strong{color:var(--y)}
.textarea{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:12px;outline:none;width:100%;resize:none;line-height:1.5}
.textarea:focus{border-color:var(--y)}
.folio-row{display:flex;gap:8px;align-items:center}
.folio-inp{background:var(--bg2);border:1px solid var(--y2);color:var(--y);padding:10px 12px;font-family:inherit;font-size:16px;font-weight:700;outline:none;width:100%;letter-spacing:.1em}
.foto-zone{border:1px dashed var(--border);padding:20px;text-align:center;cursor:pointer;background:var(--bg2);margin-bottom:8px}
.foto-thumb{width:70px;height:70px;object-fit:cover;border:1px solid var(--border)}
.foto-grid{display:flex;flex-wrap:wrap;gap:6px}
.remove-foto{background:var(--red);border:none;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;cursor:pointer;display:block;width:70px;text-align:center;margin-top:2px}
.preview-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:100;overflow-y:auto;padding:16px}
.preview-close{position:fixed;top:12px;right:12px;background:var(--y);color:#0d0d0d;border:none;width:36px;height:36px;font-size:18px;font-weight:900;cursor:pointer;z-index:101;border-radius:50%}
/* PDF */
.pdf-page{background:#fff;color:#111;font-family:'Helvetica Neue',Arial,sans-serif;max-width:760px;margin:0 auto;padding:28px 32px;position:relative}
.pdf-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;border-bottom:3px solid #f5c800;padding-bottom:12px}
.pdf-logo{height:54px;object-fit:contain}
.pdf-co{text-align:right;font-size:10px;color:#444;line-height:1.6}
.pdf-co .lic{color:#f5a800;font-weight:900;font-size:11px}
.pdf-title{text-align:right;margin-top:6px}
.pdf-title h1{font-size:20px;font-weight:900;color:#111;text-transform:uppercase}
.pdf-title .fol{font-size:10px;color:#888;margin-top:2px}
.pdf-sec{margin:14px 0}
.pdf-sec h3{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:#999;margin-bottom:7px;border-bottom:1px solid #eee;padding-bottom:3px}
.pdf-f{display:flex;margin-bottom:5px;font-size:11px}
.pdf-f label{font-weight:700;color:#444;min-width:150px;flex-shrink:0}
.pdf-f span{color:#111;border-bottom:1px solid #ddd;flex:1}
.pdf-plagas{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin:6px 0}
.pdf-pl{font-size:11px;font-weight:700;color:#111;padding:3px 0;display:flex;align-items:center;gap:5px}
.pdf-pl::before{content:"•";color:#f5c800;font-size:14px}
.pdf-svcs{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:6px 0}
.pdf-svc{display:flex;align-items:center;gap:7px;font-size:10px;color:#444}
.pdf-sbox{width:11px;height:11px;border:1.5px solid #aaa;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#f5a800}
.pdf-txt{font-size:10px;color:#444;line-height:1.7;text-align:justify;margin:6px 0}
.pdf-txt strong{color:#111}
.pdf-disc{background:#f9f9f9;border-left:3px solid #f5c800;padding:9px 13px;font-size:9px;color:#555;margin:10px 0;line-height:1.6}
.pdf-disc strong{color:#333}
.pdf-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:20px;padding-top:14px;border-top:2px solid #f5c800}
.pdf-sign{text-align:center}
.pdf-sign .ln{border-top:1px solid #333;width:150px;margin:28px auto 4px}
.pdf-sign p{font-size:10px;color:#333;font-weight:700}
.pdf-sign .ced{font-size:9px;color:#f5a800;font-weight:700}
.pdf-wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);opacity:.04;font-size:72px;font-weight:900;color:#f5c800;pointer-events:none;white-space:nowrap}
.pdf-copy{text-align:center;font-size:8px;color:#bbb;margin-top:10px}
.pdf-btmbar{background:#111;height:7px;margin:16px -32px -28px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-row"><div class="logo-wm">PLAGA<b>W</b>AY</div><div class="logo-pill">Docs</div></div>
      <div class="hdr-sub">Documentación oficial · Solo Admin</div>
    </div>
    <div class="hdr-right">
      <button class="btn-sm" onclick="try{window.close()}catch(e){window.location.replace('index.html')}">← Cotizador</button>
    </div>
  </div>
  <div class="cnt fade" id="cnt"></div>
</div>

function applyPrefill(){
  try{const raw=sessionStorage.getItem('pw_doc_prefill');if(!raw)return;
    const d=JSON.parse(raw);sessionStorage.removeItem('pw_doc_prefill');
    if(d.type)DT=d.type;
    if(d.clientName){P.clientName=C.clientName=d.clientName||'';P.clientAddr=C.clientAddr=d.clientAddr||''}
    C.fecha=new Date().toISOString().split('T')[0];
    P.vDesde=new Date().toISOString().split('T')[0];
  }catch(e){}
}

function render(){
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  const s=DT==='poliza'?P:C;
  c.innerHTML=`
  <div class="st"><span class="st-n">📄</span><span class="st-h">Documentos oficiales</span></div>
  <div class="blk"><span class="lbl">Tipo de documento</span>
    <div class="g2">
      <button class="card ${DT==='poliza'?'on':''}" onclick="DT='poliza';AT='client';render()"><div class="ct">Póliza de Servicio</div><div class="cs">Contrato y garantía</div></button>
      <button class="card ${DT==='cert'?'on':''}" onclick="DT='cert';AT='client';render()"><div class="ct">Certificado</div><div class="cs">Comprobante de aplicación</div></button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab ${AT==='client'?'act':''}" onclick="AT='client';render()">Cliente</button>
    <button class="tab ${AT==='plagas'?'act':''}" onclick="AT='plagas';render()">Plagas</button>
    ${DT==='cert'?`<button class="tab ${AT==='svc'?'act':''}" onclick="AT='svc';render()">Servicio</button>`:''}
    <button class="tab ${AT==='co'?'act':''}" onclick="AT='co';render()">Empresa</button>
  </div>
  ${AT==='client'?rClient():AT==='plagas'?rPlagas():AT==='svc'?rSvc():rCo()}
  <div class="blk" style="margin-top:4px">
    <span class="lbl">Fotos de evidencia</span>
    <div class="foto-zone" onclick="document.getElementById('fi').click()">
      <div style="font-size:26px;margin-bottom:5px">📷</div>
      <div style="font-size:12px;color:var(--mu2)">Toca para agregar foto desde cámara o galería</div>
    </div>
    <input type="file" id="fi" accept="image/*" multiple capture="environment" style="display:none" onchange="addFotos(this.files)">
    ${photos.length>0?`<div class="foto-grid">${photos.map((p,i)=>`<div><img class="foto-thumb" src="${p}"><button class="remove-foto" onclick="photos.splice(${i},1);render()">✕ Quitar</button></div>`).join('')}</div>`:''}

  <button class="cta og" onclick="shareDoc()">📤 &nbsp;Compartir por WhatsApp</button>`;
}

  <div class="blk">

function rCo(){

function togP(p){const s=DT==='poliza'?P:C;const i=s.plagas.indexOf(p);if(i>=0)s.plagas.splice(i,1);else s.plagas.push(p);render()}
function togS(sv){const i=C.servicios.indexOf(sv);if(i>=0)C.servicios.splice(i,1);else C.servicios.push(sv);render()}
function updCo(k,v){const co=getCo();co[k]=v;saveCo(co)}
function addFotos(files){Array.from(files).forEach(f=>{const r=new FileReader();r.onload=e=>{photos.push(e.target.result);render()};r.readAsDataURL(f)})}
function fmtD(d){if(!d)return'___________';const[y,m,day]=d.split('-');const M=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];return`${parseInt(day)} de ${M[parseInt(m)]} de ${y}`}

function buildHTML(){
  const co=getCo();

  const folio=s.folio||'____';
  const fecha=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
  if(DT==='poliza')return buildP(co,folio,fecha);
  return buildC(co,folio,fecha);
}

function cp(t){navigator.clipboard.writeText(t).then(()=>toast('Copiado ✓')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copiado ✓')})}
function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#f5c800;color:#0d0d0d;padding:10px 20px;font-weight:900;font-size:12px;z-index:999;white-space:nowrap';document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
